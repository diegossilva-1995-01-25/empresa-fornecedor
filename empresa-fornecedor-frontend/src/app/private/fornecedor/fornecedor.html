<div class="container">

  <form class="form-fornecedor" [formGroup]="form" (ngSubmit)="onSubmit()">

    <div class="linha">
      <label for="cpfCnpj" class="lbl">CPF ou CNPJ</label>
      <input id="cpfCnpj" type="text" class="txt" formControlName="cpfCnpj" />
    </div>

    <div class="linha">
      <label for="nome" class="lbl">Nome</label>
      <input id="nome" type="text" class="txt" formControlName="nome" />
    </div>

    <div class="linha">
      <label for="email" class="lbl">E-Mail</label>
      <input id="email" type="email" class="txt" formControlName="email" />
    </div>

    <div class="linha">
      <label for="cep" class="lbl">CEP</label>
      <input id="cep" type="number" class="txt" formControlName="cep" />
    </div>

    @if (form.get('cpfCnpj')?.value?.length == 11) {

        <div class="linha">
            <label for="rg" class="lbl">RG</label>
            <input id="rg" type="text" class="txt" formControlName="rg" />
        </div>

        <div class="linha">
            <label for="nasc" class="lbl">Data Nascimento</label>
            <input id="nasc" type="number" class="txt" formControlName="nasc" />
        </div>

    }

    <div class="linha-botoes">
      <button class="green" type="submit" [disabled]="form.invalid">
        <span class="mdi mdi-content-save"></span>
      </button>
      <button class="red" type="button" (click)="redirectHome()">
        <span class="mdi mdi-close"></span>
      </button>
    </div>

  </form>

</div>
