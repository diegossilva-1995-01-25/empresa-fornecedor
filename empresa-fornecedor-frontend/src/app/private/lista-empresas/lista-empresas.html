<div class="form-lista-empresas">

  <table class="table">
    <thead>
      <tr>
          <th>CNPJ</th>
          <th>Nome Fant.</th> 
          <th>CEP</th> 
          <th>Editar</th>
          <th>Deletar</th>
      </tr>
    </thead>
    <tbody>
      @for (empresa of empresas; track empresa.cnpj) {
          <tr>
            <td>{{ empresa.cnpj }}</td>
            <td>{{ empresa.nomeFantasia }}</td>
            <td>{{ empresa.cep }}</td>
            <td>
              <button class="blue" type="button" (click)="redirectEditarEmpresa(empresa)">
                <span class="mdi mdi-pencil"></span>
              </button>
            </td>
            <td>
              <button class="red" type="button" (click)="deletarEmpresa(empresa)">
                <span class="mdi mdi-delete"></span>
              </button>
            </td>
          </tr>
      } @empty {
          <tr><td colspan="3">Não há empresas cadastradas.</td></tr>
      }
    </tbody>
  </table>

</div>
